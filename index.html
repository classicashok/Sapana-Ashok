<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Social Drive Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#0f172a;color:white;}
.reels {height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;}
.card {height:100vh;scroll-snap-align:start;display:flex;flex-direction:column;justify-content:center;align-items:center;}
img,iframe {max-width:90%;max-height:60vh;border-radius:20px;}
.actions {margin-top:10px;text-align:center;}
input {padding:8px;border-radius:10px;border:none;width:200px;}
button {padding:6px 10px;border:none;border-radius:10px;background:#ef4444;color:white;margin:5px;cursor:pointer;}
.comments {max-height:120px;overflow:auto;font-size:0.85em;width:220px;text-align:left;}
</style>
</head>
<body>

<div class="reels" id="gallery"></div>

<script>
// 🔑 CONFIG
const SUPABASE_URL = 'https://fwrlzpehvuctzqsguofw.supabase.co/rest/v1/';
const SUPABASE_KEY = 'sb_publishable_YI4qDk2pW2slwzv6O39Zdw_1EmJL8f2';
const API_KEY = 'AIzaSyD_ToineiqPRdonnu-Gu1IsKwLLQ8hpst8';
const FOLDER_ID = '1xag3sSGYi0avsmL0xhl0zpLB9AVK6F56';

// ⚠️ TABLE NAME (LOWERCASE FIX)
const TABLE = 'marriage';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const gallery = document.getElementById('gallery');

const username = prompt('Enter your name:') || 'Anonymous';

async function getData(fileId){
  let { data } = await supabaseClient.from(TABLE).select('*').eq('id', fileId).single();
  if(!data){
    await supabaseClient.from(TABLE).insert({id:fileId, likes:0, users:[], comments:[]});
    return {likes:0, users:[], comments:[]};
  }
  return data;
}

// 🔔 TRUE REALTIME (NO RELOAD)
function enableRealtime(){
  supabaseClient.channel('live')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:TABLE},payload=>{
      const updated = payload.new;
      const card = document.getElementById(updated.id);
      if(!card) return;

      card.querySelector('.like').innerText = `❤️ ${updated.likes}`;

      const commentsDiv = card.querySelector('.comments');
      commentsDiv.innerHTML = '';
      updated.comments.forEach(c=>{
        const d=document.createElement('div');
        d.innerText=c;
        commentsDiv.appendChild(d);
      });
    }).subscribe();
}

function init(){
  gapi.client.setApiKey(API_KEY);
  return gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest').then(loadFiles);
}

function loadFiles(){
  return gapi.client.drive.files.list({
    q: `'${FOLDER_ID}' in parents and trashed=false`,
    fields: 'files(id,name,mimeType)'
  }).then(res=>displayFiles(res.result.files));
}

async function displayFiles(files){
  for(const file of files){
    const isVideo = file.mimeType.includes('video');
    const isImage = file.mimeType.includes('image');
    if(!isVideo && !isImage) continue;

    const data = await getData(file.id);
    let likeCount = data.likes;
    let users = data.users || [];
    let commentsList = data.comments || [];

    const card = document.createElement('div');
    card.className='card';
    card.id = file.id;

    let media;
    if(isImage){
      media=document.createElement('img');
      media.src=`https://lh3.googleusercontent.com/d/${file.id}=w1000`;
    } else {
      media=document.createElement('iframe');
      media.src=`https://drive.google.com/file/d/${file.id}/preview`;
    }

    const actions=document.createElement('div');
    actions.className='actions';

    const likeBtn=document.createElement('button');
    likeBtn.className='like';
    likeBtn.innerText=`❤️ ${likeCount}`;

    likeBtn.onclick=async()=>{
      if(users.includes(username)){
        alert('Already liked'); return;
      }
      likeCount++;
      users.push(username);
      await supabaseClient.from(TABLE).update({likes:likeCount, users}).eq('id',file.id);
    };

    const input=document.createElement('input');
    input.placeholder='Comment...';

    const comments=document.createElement('div');
    comments.className='comments';

    function renderComments(list){
      comments.innerHTML='';
      list.forEach(c=>{
        const d=document.createElement('div');
        d.innerText=c;
        comments.appendChild(d);
      });
    }

    renderComments(commentsList);

    input.addEventListener('keypress', async (e)=>{
      if(e.key==='Enter' && input.value.trim()){
        const text = username + ': ' + input.value;
        commentsList.push(text);
        await supabaseClient.from(TABLE).update({comments:commentsList}).eq('id',file.id);
        input.value='';
      }
    });

    actions.appendChild(likeBtn);
    actions.appendChild(input);
    actions.appendChild(comments);

    card.appendChild(media);
    card.appendChild(actions);
    gallery.appendChild(card);
  }
}

enableRealtime();
gapi.load('client', init);
</script>

</body>
</html>
