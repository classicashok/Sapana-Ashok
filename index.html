<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sejal Memories</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<style>
body {margin:0;background:black;color:white;font-family:Poppins;overflow:hidden;}
.reels {height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;}
.card {height:100vh;scroll-snap-align:start;position:relative;}
video, img, iframe {
  position:absolute;
  width:100%;
  height:100%;
  background:black;
}

/* Smart scaling */
video {
  object-fit: cover; /* immersive like TikTok */
}

img {
  object-fit: contain; /* no cropping for photos */
}
.overlay {position:absolute;bottom:0;width:100%;padding:20px;display:flex;justify-content:space-between;}
.left {max-width:70%;}
.username {font-weight:bold;margin-bottom:5px;}
.caption {font-size:0.9em;margin-bottom:10px;}
.comments {font-size:0.8em;max-height:60px;overflow:auto;opacity:0.9;}
.right {display:flex;flex-direction:column;align-items:center;gap:20px;}
.icon {font-size:26px;cursor:pointer;transition:0.2s;}
.icon:active {transform:scale(1.3);}
.heart-anim {position:absolute;font-size:80px;color:white;opacity:0;pointer-events:none;}
input {width:100%;padding:6px;border-radius:10px;border:none;margin-top:5px;}
</style>
</head>
<body>
<div class="reels" id="gallery"></div>

<script>
const SUPABASE_URL='https://fwrlzpehvuctzqsguofw.supabase.co';
const SUPABASE_KEY='sb_publishable_YI4qDk2pW2slwzv6O39Zdw_1EmJL8f2';
const API_KEY='AIzaSyD_ToineiqPRdonnu-Gu1IsKwLLQ8hpst8';
const FOLDER_ID='1xag3sSGYi0avsmL0xhl0zpLB9AVK6F56';
const TABLE='marriage';

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const gallery=document.getElementById('gallery');

let username=localStorage.getItem('user')||prompt('Enter username');
localStorage.setItem('user',username);

async function getData(id){
 let {data}=await supabaseClient.from(TABLE).select('*').eq('id',id).single();
 if(!data){
  await supabaseClient.from(TABLE).insert({id,likes:0,users:[],comments:[]});
  return {likes:0,users:[],comments:[]};
 }
 return data;
}

function realtime(){
 supabaseClient.channel('live').on('postgres_changes',{event:'UPDATE',schema:'public',table:TABLE},payload=>{
  const d=payload.new;
  const card=document.getElementById(d.id);
  if(!card)return;
  card.querySelector('.likes').innerText=d.likes;
  const cbox=card.querySelector('.comments');
  cbox.innerHTML='';
  d.comments.forEach(c=>{let div=document.createElement('div');div.innerText=c;cbox.appendChild(div);});
 }).subscribe();
}

function heartEffect(card,x,y){
 const heart=document.createElement('div');
 heart.className='heart-anim';
 heart.innerText='❤️';
 heart.style.left=x+'px';
 heart.style.top=y+'px';
 card.appendChild(heart);
 heart.animate([
  {transform:'scale(0.5)',opacity:1},
  {transform:'scale(1.5)',opacity:0}
 ],{duration:800});
 setTimeout(()=>heart.remove(),800);
}

function autoPlayVideos(){
 const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
   const vid=entry.target.querySelector('video');
   if(!vid)return;
   if(entry.isIntersecting){vid.play();}
   else{vid.pause();}
  });
 },{threshold:0.6});
 document.querySelectorAll('.card').forEach(c=>observer.observe(c));
}

function init(){
 gapi.client.setApiKey(API_KEY);
 return gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest').then(loadFiles);
}

function loadFiles(){
 return gapi.client.drive.files.list({q:`'${FOLDER_ID}' in parents`,fields:'files(id,name,mimeType)'}).then(r=>display(r.result.files));
}

async function display(files){
 for(const f of files){
  if(!f.mimeType.includes('image')&&!f.mimeType.includes('video'))continue;
  const data=await getData(f.id);
  let likes=data.likes;
  let users=data.users||[];
  let comments=data.comments||[];

  const card=document.createElement('div');
  card.className='card';card.id=f.id;

  let media;
  if(f.mimeType.includes('image')){
   media=document.createElement('img');
   media.src=`https://lh3.googleusercontent.com/d/${f.id}=w1000`;
  } else {
   media=document.createElement('video');
   media.src=`https://drive.google.com/uc?export=download&id=${f.id}`;
   media.loop=true;media.muted=true;
  }

  media.ondblclick=(e)=>{
   like.click();
   heartEffect(card,e.clientX,e.clientY);
  };

  const overlay=document.createElement('div');overlay.className='overlay';

  const left=document.createElement('div');left.className='left';
  left.innerHTML=`<div class='username'>@${username}</div><div class='caption'>#memories #love</div>`;

  const cbox=document.createElement('div');cbox.className='comments';
  comments.forEach(c=>{let d=document.createElement('div');d.innerText=c;cbox.appendChild(d);});

  const input=document.createElement('input');input.placeholder='Comment...';
  input.onkeypress=async(e)=>{
   if(e.key==='Enter'&&input.value){
    const text=username+': '+input.value;
    comments.push(text);
    await supabaseClient.from(TABLE).update({comments}).eq('id',f.id);
    input.value='';
   }
  };

  left.appendChild(cbox);left.appendChild(input);

  const right=document.createElement('div');right.className='right';

  const like=document.createElement('div');like.className='icon';
  like.innerHTML=`❤️ <span class='likes'>${likes}</span>`;
  like.onclick=async()=>{
   if(users.includes(username))return;
   likes++;users.push(username);
   await supabaseClient.from(TABLE).update({likes,users}).eq('id',f.id);
  };

  const share=document.createElement('div');share.className='icon';share.innerText='🔗';
  share.onclick=()=>navigator.clipboard.writeText(location.href);

  right.appendChild(like);
  right.appendChild(share);

  overlay.appendChild(left);
  overlay.appendChild(right);

  card.appendChild(media);
  card.appendChild(overlay);
  gallery.appendChild(card);
 }
 autoPlayVideos();
}

realtime();
gapi.load('client',init);
</script>
</body>
</html>
