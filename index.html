<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Style Drive Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://apis.google.com/js/api.js"></script>
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:black;color:white;overflow:hidden;}

.reels {height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;}
.card {height:100vh;scroll-snap-align:start;position:relative;display:flex;justify-content:center;align-items:center;background:black;}

video, img, iframe {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  bottom:20px;
  left:15px;
  right:15px;
  display:flex;
  justify-content:space-between;
}

.left {
  max-width:70%;
}

.username {
  font-weight:bold;
}

.comments {
  font-size:0.85em;
  max-height:80px;
  overflow:auto;
}

.right {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

.icon {
  font-size:22px;
  cursor:pointer;
}

input {
  width:100%;
  padding:6px;
  border:none;
  border-radius:10px;
  margin-top:5px;
}

</style>
</head>
<body>

<div class="reels" id="gallery"></div>

<script>
const SUPABASE_URL = 'https://fwrlzpehvuctzqsguofw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YI4qDk2pW2slwzv6O39Zdw_1EmJL8f2';
const API_KEY = 'AIzaSyD_ToineiqPRdonnu-Gu1IsKwLLQ8hpst8';
const FOLDER_ID = '1xag3sSGYi0avsmL0xhl0zpLB9AVK6F56';
const TABLE = 'marriage';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const gallery = document.getElementById('gallery');

let username = localStorage.getItem('user') || prompt('Enter username');
localStorage.setItem('user', username);

async function getData(fileId){
  let { data } = await supabaseClient.from(TABLE).select('*').eq('id', fileId).single();
  if(!data){
    await supabaseClient.from(TABLE).insert({id:fileId, likes:0, users:[], comments:[]});
    return {likes:0, users:[], comments:[]};
  }
  return data;
}

function enableRealtime(){
  supabaseClient.channel('live')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:TABLE},payload=>{
      const updated = payload.new;
      const card = document.getElementById(updated.id);
      if(!card) return;

      card.querySelector('.like-count').innerText = updated.likes;

      const commentsDiv = card.querySelector('.comments');
      commentsDiv.innerHTML='';
      updated.comments.forEach(c=>{
        const d=document.createElement('div');
        d.innerText=c;
        commentsDiv.appendChild(d);
      });
    }).subscribe();
}

function init(){
  gapi.client.setApiKey(API_KEY);
  return gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest').then(loadFiles);
}

function loadFiles(){
  return gapi.client.drive.files.list({
    q: `'${FOLDER_ID}' in parents and trashed=false`,
    fields: 'files(id,name,mimeType)'
  }).then(res=>displayFiles(res.result.files));
}

async function displayFiles(files){
  for(const file of files){
    const isVideo = file.mimeType.includes('video');
    const isImage = file.mimeType.includes('image');
    if(!isVideo && !isImage) continue;

    const data = await getData(file.id);
    let likeCount = data.likes;
    let users = data.users || [];
    let commentsList = data.comments || [];

    const card = document.createElement('div');
    card.className='card';
    card.id=file.id;

    let media;
    if(isImage){
      media=document.createElement('img');
      media.src=`https://lh3.googleusercontent.com/d/${file.id}=w1000`;
    } else {
      media=document.createElement('iframe');
      media.src=`https://drive.google.com/file/d/${file.id}/preview`;
    }

    const overlay=document.createElement('div');
    overlay.className='overlay';

    const left=document.createElement('div');
    left.className='left';

    const user=document.createElement('div');
    user.className='username';
    user.innerText='@'+username;

    const comments=document.createElement('div');
    comments.className='comments';

    commentsList.forEach(c=>{
      const d=document.createElement('div');
      d.innerText=c;
      comments.appendChild(d);
    });

    const input=document.createElement('input');
    input.placeholder='Add comment...';

    input.addEventListener('keypress', async e=>{
      if(e.key==='Enter' && input.value.trim()){
        const text=username+': '+input.value;
        commentsList.push(text);
        await supabaseClient.from(TABLE).update({comments:commentsList}).eq('id',file.id);
        input.value='';
      }
    });

    left.appendChild(user);
    left.appendChild(comments);
    left.appendChild(input);

    const right=document.createElement('div');
    right.className='right';

    const like=document.createElement('div');
    like.className='icon';
    like.innerHTML='❤️ <span class="like-count">'+likeCount+'</span>';

    like.onclick=async()=>{
      if(users.includes(username)) return;
      likeCount++;
      users.push(username);
      await supabaseClient.from(TABLE).update({likes:likeCount, users}).eq('id',file.id);
    };

    media.ondblclick=()=>like.click();

    right.appendChild(like);

    overlay.appendChild(left);
    overlay.appendChild(right);

    card.appendChild(media);
    card.appendChild(overlay);

    gallery.appendChild(card);
  }
}

enableRealtime();
gapi.load('client', init);
</script>

</body>
</html>
